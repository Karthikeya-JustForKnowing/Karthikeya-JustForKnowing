<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <style>
      @keyframes slideDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }
      @keyframes pulse     { 0%,100%{opacity:.5} 50%{opacity:1} }
      .name { animation: slideDown .7s .1s both }
      .sub  { animation: slideUp  .7s .5s both }
      .dot  { animation: pulse 2.5s ease-in-out infinite }
    </style>
  </defs>

  <!-- background -->
  <rect width="800" height="160" rx="14" fill="url(#bg)"/>

  <!-- decorative dots -->
  <circle cx="40"  cy="30"  r="3" fill="#a78bfa" opacity=".4" class="dot"/>
  <circle cx="760" cy="130" r="3" fill="#a78bfa" opacity=".4" class="dot" style="animation-delay:.8s"/>
  <circle cx="780" cy="40"  r="2" fill="#7c3aed" opacity=".5" class="dot" style="animation-delay:1.4s"/>
  <circle cx="20"  cy="130" r="2" fill="#7c3aed" opacity=".5" class="dot" style="animation-delay:.4s"/>

  <!-- thin accent line -->
  <rect x="340" y="118" width="120" height="2" rx="1" fill="url(#txt)" opacity=".6"/>

  <!-- name -->
  <text x="400" y="80" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="900"
        fill="url(#txt)" class="name">Sri Karthikeya</text>

  <!-- subtitle -->
  <text x="400" y="112" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="14" font-weight="400"
        fill="#888888" class="sub">Full-Stack &amp; AI Developer  ·  Video Editor  ·  Andhra Pradesh, India</text>
</svg>
