<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" width="600" height="320">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .titlebar { fill: #1a1a2e; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      .prompt { fill: #a78bfa; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
      .cmd { fill: #cdd6f4; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
      .key { fill: #6c7086; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
      .val { fill: #cba6f7; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
      .cursor { fill: #a78bfa; }
      .title-text { fill: #6c7086; font-family: monospace; font-size: 12px; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="600" height="320" rx="10" class="bg"/>
  <!-- Title bar -->
  <rect width="600" height="32" rx="10" class="titlebar"/>
  <rect y="20" width="600" height="12" class="titlebar"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" class="dot-red"/>
  <circle cx="40" cy="16" r="6" class="dot-yellow"/>
  <circle cx="60" cy="16" r="6" class="dot-green"/>
  <!-- Title -->
  <text x="300" y="21" text-anchor="middle" class="title-text">karthikeya@github: ~</text>

  <!-- LINE 1: prompt appears at 0.2s -->
  <text x="16" y="64" class="prompt" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.2s" fill="freeze"/>
    ┌──(karthikeya㉿github)-[~]
  </text>

  <!-- LINE 2: $ whoami types out -->
  <text x="16" y="84" class="prompt" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
    └─$
  </text>
  <text x="52" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.7s" fill="freeze"/>
    w
  </text>
  <text x="61" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.85s" fill="freeze"/>
    h
  </text>
  <text x="70" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.0s" fill="freeze"/>
    o
  </text>
  <text x="79" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.15s" fill="freeze"/>
    a
  </text>
  <text x="88" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.3s" fill="freeze"/>
    m
  </text>
  <text x="97" y="84" class="cmd" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.45s" fill="freeze"/>
    i
  </text>

  <!-- OUTPUT lines appear one by one -->
  <!-- Name -->
  <text x="16" y="114" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
    <tspan class="key">  Name     </tspan><tspan class="prompt">──</tspan><tspan class="val">  Sri Karthikeya</tspan>
  </text>

  <!-- Role -->
  <text x="16" y="134" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.3s" fill="freeze"/>
    <tspan class="key">  Role     </tspan><tspan class="prompt">──</tspan><tspan class="val">  Full-Stack Dev  •  AI Builder</tspan>
  </text>

  <!-- Also -->
  <text x="16" y="154" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.7s" fill="freeze"/>
    <tspan class="key">           </tspan><tspan class="prompt">  </tspan><tspan class="val">  Video Editor</tspan>
  </text>

  <!-- Location -->
  <text x="16" y="174" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.1s" fill="freeze"/>
    <tspan class="key">  Location </tspan><tspan class="prompt">──</tspan><tspan class="val">  Andhra Pradesh, India 🇮🇳</tspan>
  </text>

  <!-- Status -->
  <text x="16" y="194" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
    <tspan class="key">  Status   </tspan><tspan class="prompt">──</tspan><tspan class="val">  ● Open to Work</tspan>
  </text>

  <!-- Motto -->
  <text x="16" y="214" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.9s" fill="freeze"/>
    <tspan class="key">  Motto    </tspan><tspan class="prompt">──</tspan><tspan class="val">  "Ship first. Iterate fast."</tspan>
  </text>

  <!-- LINE: new prompt -->
  <text x="16" y="254" class="prompt" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="4.4s" fill="freeze"/>
    └─$
  </text>

  <!-- Blinking cursor -->
  <rect x="52" y="242" width="9" height="16" rx="1" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="4.4s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="4.4s" repeatCount="indefinite"/>
  </rect>
</svg>
