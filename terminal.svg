<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340">
  <defs>
    <style>
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      .mono { font-family:'Courier New',Courier,monospace; font-size:13.5px; }
      .dim  { fill:#484f58; }
      .wht  { fill:#e6edf3; }
      .pur  { fill:#a78bfa; }
      .grn  { fill:#3fb950; }
      .cyn  { fill:#79c0ff; }
      .cur  { fill:#a78bfa; animation:blink 1s step-end infinite; }
      .l1  { opacity:0; animation:fadeIn .25s 1.2s forwards; }
      .l2  { opacity:0; animation:fadeIn .25s 1.9s forwards; }
      .l3  { opacity:0; animation:fadeIn .25s 2.5s forwards; }
      .l4  { opacity:0; animation:fadeIn .25s 3.0s forwards; }
      .l5  { opacity:0; animation:fadeIn .25s 3.5s forwards; }
      .l6  { opacity:0; animation:fadeIn .25s 4.0s forwards; }
      .l7  { opacity:0; animation:fadeIn .25s 4.5s forwards; }
      .l8  { opacity:0; animation:fadeIn .25s 5.0s forwards; }
      .l9  { opacity:0; animation:fadeIn .25s 5.5s forwards; }
      .l10 { opacity:0; animation:fadeIn .25s 6.0s forwards; }
      .l11 { opacity:0; animation:fadeIn .25s 6.0s forwards; }
    </style>
  </defs>

  <!-- window -->
  <rect width="680" height="340" rx="12" fill="#0d1117"/>
  <!-- title bar -->
  <rect width="680" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="680" height="12" fill="#161b22"/>
  <!-- dots -->
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="18" r="6" fill="#febc2e"/>
  <circle cx="68" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="340" y="23" text-anchor="middle" class="mono dim" font-size="11.5">bash  —  karthikeya@github: ~</text>

  <!-- L1 prompt -->
  <text x="20" y="70" class="mono l1">
    <tspan class="grn">karthikeya</tspan><tspan class="wht">@</tspan><tspan class="cyn">github</tspan><tspan class="wht">:</tspan><tspan class="pur">~</tspan><tspan class="wht">$ </tspan><tspan class="cyn">cat</tspan><tspan class="wht"> about.txt</tspan>
  </text>

  <!-- L2 top border -->
  <text x="20" y="96" class="mono dim l2">  ╔══════════════════════════════════════════════════╗</text>

  <!-- L3 name -->
  <text x="20" y="118" class="mono l3">
    <tspan class="dim">  ║  </tspan><tspan class="pur">Name      </tspan><tspan class="dim">=&gt;  </tspan><tspan class="wht">Sri Karthikeya                      </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L4 role -->
  <text x="20" y="140" class="mono l4">
    <tspan class="dim">  ║  </tspan><tspan class="pur">Role      </tspan><tspan class="dim">=&gt;  </tspan><tspan class="wht">Full-Stack Dev  /  AI Builder       </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L5 also -->
  <text x="20" y="162" class="mono l5">
    <tspan class="dim">  ║              </tspan><tspan class="wht">Video Editor                          </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L6 location -->
  <text x="20" y="184" class="mono l6">
    <tspan class="dim">  ║  </tspan><tspan class="pur">Location  </tspan><tspan class="dim">=&gt;  </tspan><tspan class="wht">Andhra Pradesh, India                </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L7 status -->
  <text x="20" y="206" class="mono l7">
    <tspan class="dim">  ║  </tspan><tspan class="pur">Status    </tspan><tspan class="dim">=&gt;  </tspan><tspan class="grn">Open to Work                        </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L8 motto -->
  <text x="20" y="228" class="mono l8">
    <tspan class="dim">  ║  </tspan><tspan class="pur">Motto     </tspan><tspan class="dim">=&gt;  </tspan><tspan class="wht">"Ship first. Iterate fast."         </tspan><tspan class="dim">║</tspan>
  </text>

  <!-- L9 bottom border -->
  <text x="20" y="250" class="mono dim l9">  ╚══════════════════════════════════════════════════╝</text>

  <!-- L10 exit -->
  <text x="20" y="276" class="mono l10">
    <tspan class="dim">  [</tspan><tspan class="grn">exit 0</tspan><tspan class="dim">]  read successfully</tspan>
  </text>

  <!-- L11 new prompt + cursor -->
  <text x="20" y="306" class="mono l11">
    <tspan class="grn">karthikeya</tspan><tspan class="wht">@</tspan><tspan class="cyn">github</tspan><tspan class="wht">:</tspan><tspan class="pur">~</tspan><tspan class="wht">$ </tspan>
  </text>
  <rect x="136" y="293" width="9" height="17" rx="1" class="cur l11"/>
</svg>
