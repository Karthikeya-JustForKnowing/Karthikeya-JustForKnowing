<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" width="680" height="230">
  <defs>
    <style>
      @keyframes popIn {
        0%   { opacity:0; transform:scale(0.4) translateY(30px); }
        65%  { opacity:1; transform:scale(1.08) translateY(-5px); }
        100% { opacity:1; transform:scale(1) translateY(0); }
      }
      @keyframes shimmer {
        0%,100% { opacity:0.7; }
        50%      { opacity:1; }
      }
      .base { font-family:'Courier New',Courier,monospace; }
      .lbl  { font-size:12px; font-weight:700; text-anchor:middle; }
      .rank { font-size:10px; text-anchor:middle; fill:#555; }
      .desc { font-size:10px; text-anchor:middle; }
      .hdr  { font-size:13px; font-weight:700; text-anchor:middle; fill:#a78bfa; font-family:'Segoe UI',Arial,sans-serif; }
      .t1 { animation:popIn .55s 1.0s both cubic-bezier(.34,1.4,.64,1); }
      .t2 { animation:popIn .55s 1.3s both cubic-bezier(.34,1.4,.64,1); }
      .t3 { animation:popIn .55s 1.6s both cubic-bezier(.34,1.4,.64,1); }
      .t4 { animation:popIn .55s 1.9s both cubic-bezier(.34,1.4,.64,1); }
      .t5 { animation:popIn .55s 2.2s both cubic-bezier(.34,1.4,.64,1); }
      .glow1 { animation:shimmer 2.2s 1.6s ease-in-out infinite; }
      .glow2 { animation:shimmer 2.2s 1.9s ease-in-out infinite; }
      .glow3 { animation:shimmer 2.2s 2.2s ease-in-out infinite; }
      .glow4 { animation:shimmer 2.2s 2.5s ease-in-out infinite; }
      .glow5 { animation:shimmer 2.2s 2.8s ease-in-out infinite; }
    </style>
  </defs>

  <!-- bg -->
  <rect width="680" height="230" rx="12" fill="#0d1117"/>

  <!-- header -->
  <text x="340" y="34" class="hdr">Achievement Wall</text>
  <line x1="60" y1="46" x2="620" y2="46" stroke="#21262d" stroke-width="0.8"/>

  <!-- 5 cards evenly spread: centers at 68, 204, 340, 476, 612  card w=108 -->

  <!-- Card 1 — Commits (gold) -->
  <g class="t1">
    <rect x="14" y="58" width="108" height="148" rx="10" fill="#161b22" stroke="#ffd70033" stroke-width="1"/>
    <rect x="14" y="58" width="108" height="4" rx="2" fill="#ffd700" opacity="0.9"/>
    <text x="68" y="104" text-anchor="middle" font-size="34" class="glow1">&#x1F3C6;</text>
    <text x="68" y="128" class="lbl" fill="#ffd700">Commits</text>
    <text x="68" y="145" class="rank">SSS Rank</text>
    <text x="68" y="161" class="desc" fill="#ffd70099">100+ pushes</text>
    <text x="68" y="195" text-anchor="middle" font-size="9" fill="#ffd700" opacity="0.6" font-family="monospace">&#x2605;&#x2605;&#x2605;</text>
  </g>

  <!-- Card 2 — Repos (purple) -->
  <g class="t2">
    <rect x="150" y="58" width="108" height="148" rx="10" fill="#161b22" stroke="#a78bfa33" stroke-width="1"/>
    <rect x="150" y="58" width="108" height="4" rx="2" fill="#a78bfa" opacity="0.9"/>
    <text x="204" y="104" text-anchor="middle" font-size="34" class="glow2">&#x1F4E6;</text>
    <text x="204" y="128" class="lbl" fill="#c084fc">Repositories</text>
    <text x="204" y="145" class="rank">AA Rank</text>
    <text x="204" y="161" class="desc" fill="#c084fc99">10+ repos</text>
    <text x="204" y="195" text-anchor="middle" font-size="9" fill="#a78bfa" opacity="0.6" font-family="monospace">&#x2605;&#x2605;</text>
  </g>

  <!-- Card 3 — AI Builder (blue) -->
  <g class="t3">
    <rect x="286" y="58" width="108" height="148" rx="10" fill="#161b22" stroke="#60a5fa33" stroke-width="1"/>
    <rect x="286" y="58" width="108" height="4" rx="2" fill="#60a5fa" opacity="0.9"/>
    <text x="340" y="104" text-anchor="middle" font-size="34" class="glow3">&#x1F916;</text>
    <text x="340" y="128" class="lbl" fill="#60a5fa">AI Builder</text>
    <text x="340" y="145" class="rank">S Rank</text>
    <text x="340" y="161" class="desc" fill="#60a5fa99">Rare achieve</text>
    <text x="340" y="195" text-anchor="middle" font-size="9" fill="#60a5fa" opacity="0.6" font-family="monospace">&#x2605;&#x2605;&#x2605;</text>
  </g>

  <!-- Card 4 — Shipper (green) -->
  <g class="t4">
    <rect x="422" y="58" width="108" height="148" rx="10" fill="#161b22" stroke="#4ade8033" stroke-width="1"/>
    <rect x="422" y="58" width="108" height="4" rx="2" fill="#4ade80" opacity="0.9"/>
    <text x="476" y="104" text-anchor="middle" font-size="34" class="glow4">&#x1F680;</text>
    <text x="476" y="128" class="lbl" fill="#4ade80">Shipper</text>
    <text x="476" y="145" class="rank">SS Rank</text>
    <text x="476" y="161" class="desc" fill="#4ade8099">Fast delivery</text>
    <text x="476" y="195" text-anchor="middle" font-size="9" fill="#4ade80" opacity="0.6" font-family="monospace">&#x2605;&#x2605;&#x2605;</text>
  </g>

  <!-- Card 5 — Video Editor (pink) -->
  <g class="t5">
    <rect x="558" y="58" width="108" height="148" rx="10" fill="#161b22" stroke="#f472b633" stroke-width="1"/>
    <rect x="558" y="58" width="108" height="4" rx="2" fill="#f472b6" opacity="0.9"/>
    <text x="612" y="104" text-anchor="middle" font-size="34" class="glow5">&#x1F3AC;</text>
    <text x="612" y="128" class="lbl" fill="#f472b6">Video Editor</text>
    <text x="612" y="145" class="rank">S Rank</text>
    <text x="612" y="161" class="desc" fill="#f472b699">Cinematic cuts</text>
    <text x="612" y="195" text-anchor="middle" font-size="9" fill="#f472b6" opacity="0.6" font-family="monospace">&#x2605;&#x2605;&#x2605;</text>
  </g>
</svg>
