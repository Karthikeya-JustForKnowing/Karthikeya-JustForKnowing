<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes popIn {
        0%   { opacity:0; transform: scale(0.5) translateY(20px); }
        70%  { transform: scale(1.1) translateY(-4px); }
        100% { opacity:1; transform: scale(1) translateY(0); }
      }
      @keyframes glow-pulse {
        0%,100% { filter: drop-shadow(0 0 4px currentColor); }
        50%      { filter: drop-shadow(0 0 12px currentColor); }
      }
      .t1 { animation: popIn .5s 0.2s both cubic-bezier(.34,1.56,.64,1) }
      .t2 { animation: popIn .5s 0.5s both cubic-bezier(.34,1.56,.64,1) }
      .t3 { animation: popIn .5s 0.8s both cubic-bezier(.34,1.56,.64,1) }
      .t4 { animation: popIn .5s 1.1s both cubic-bezier(.34,1.56,.64,1) }
      .t5 { animation: popIn .5s 1.4s both cubic-bezier(.34,1.56,.64,1) }
      .lbl { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; }
      .sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; text-anchor: middle; fill: #666; }
      .bg  { fill: #0d1117; }
      .card { fill: #161b22; rx: 10; }
    </style>
  </defs>

  <!-- background -->
  <rect width="760" height="200" rx="14" class="bg"/>

  <!-- title -->
  <text x="380" y="30" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">🏆  Achievement Wall</text>
  <line x1="80" y1="40" x2="680" y2="40" stroke="#21262d" stroke-width="1"/>

  <!-- Trophy 1: Commits -->
  <g class="t1" transform="translate(55,75)">
    <rect x="-48" y="-32" width="96" height="100" rx="10" fill="#161b22"/>
    <text y="-8" text-anchor="middle" font-size="30" filter="url(#glow)" fill="url(#gold)">🏅</text>
    <text y="18" class="lbl" fill="#ffd700">Commits</text>
    <text y="30" class="sub">SSS Rank</text>
    <text y="44" class="sub" fill="#ffd700">100+ commits</text>
  </g>

  <!-- Trophy 2: Repos -->
  <g class="t2" transform="translate(205,75)">
    <rect x="-48" y="-32" width="96" height="100" rx="10" fill="#161b22"/>
    <text y="-8" text-anchor="middle" font-size="30" filter="url(#glow)" fill="url(#purple)">📦</text>
    <text y="18" class="lbl" fill="#c084fc">Repositories</text>
    <text y="30" class="sub">AA Rank</text>
    <text y="44" class="sub" fill="#c084fc">10+ repos</text>
  </g>

  <!-- Trophy 3: AI Builder -->
  <g class="t3" transform="translate(355,75)">
    <rect x="-48" y="-32" width="96" height="100" rx="10" fill="#161b22"/>
    <text y="-8" text-anchor="middle" font-size="30" filter="url(#glow)" fill="url(#blue)">🤖</text>
    <text y="18" class="lbl" fill="#60a5fa">AI Builder</text>
    <text y="30" class="sub">S Rank</text>
    <text y="44" class="sub" fill="#60a5fa">Rare achieve</text>
  </g>

  <!-- Trophy 4: Shipper -->
  <g class="t4" transform="translate(505,75)">
    <rect x="-48" y="-32" width="96" height="100" rx="10" fill="#161b22"/>
    <text y="-8" text-anchor="middle" font-size="30" filter="url(#glow)" fill="url(#green)">🚀</text>
    <text y="18" class="lbl" fill="#4ade80">Shipper</text>
    <text y="30" class="sub">SS Rank</text>
    <text y="44" class="sub" fill="#4ade80">Fast delivery</text>
  </g>

  <!-- Trophy 5: Video -->
  <g class="t5" transform="translate(655,75)">
    <rect x="-48" y="-32" width="96" height="100" rx="10" fill="#161b22"/>
    <text y="-8" text-anchor="middle" font-size="30" filter="url(#glow)" fill="url(#silver)">🎬</text>
    <text y="18" class="lbl" fill="#e8e8e8">Video Editor</text>
    <text y="30" class="sub">S Rank</text>
    <text y="44" class="sub" fill="#e8e8e8">Cinematic cuts</text>
  </g>
</svg>
